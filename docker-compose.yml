# Carelwave Media — RAG Stack
# Usage: docker compose up
# Requires: OPENAI_API_KEY in backend/.env

services:
  # Frontend (Vite dev server)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cwmedia-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Go RAG Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cwmedia-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://raguser:ragpass@postgres:5432/ragdb?sslmode=disable
      - ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL with pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: cwmedia-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
    driver: local
