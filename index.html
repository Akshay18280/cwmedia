    <!-- Critical CSS (inline for performance) -->
    <style>
      /* Critical above-the-fold styles */
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
      .loading-screen { 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex; 
        align-items: center; 
        justify-content: center; 
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .loading-screen.hidden { 
        opacity: 0; 
        pointer-events: none; 
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loader"></div>
    </div>
    
    <!-- Main App Container -->
    <div id="root"></div>
    
    <!-- Fallback content if React doesn't mount -->
    <div id="fallback-content" style="display: none; padding: 40px; text-align: center; font-family: sans-serif;">
      <h1 style="color: #333;">🔧 Development Mode</h1>
      <p style="color: #666;">React is loading... If this message persists, check the browser console for errors.</p>
      <p style="color: #999; font-size: 14px;">Carelwave Media - Local Development</p>
    </div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    
    <!-- Hide Loading Screen -->
    <script>
      let loadingHidden = false;
      
      function hideLoadingScreen() {
        if (loadingHidden) return;
        loadingHidden = true;
        
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          console.log('🎯 Hiding loading screen');
          loadingScreen.classList.add('hidden');
          setTimeout(() => {
            loadingScreen.remove();
          }, 300);
        }
      }
      
      // Hide loading screen when DOM is loaded
      window.addEventListener('load', () => {
        setTimeout(hideLoadingScreen, 500);
      });
      
             // Also hide after 3 seconds as fallback
       setTimeout(() => {
         hideLoadingScreen();
         // Show fallback if React hasn't mounted
         setTimeout(() => {
           const root = document.getElementById('root');
           const fallback = document.getElementById('fallback-content');
           if (root && fallback && (!root.children || root.children.length === 0)) {
             console.log('🔧 Showing fallback content - React may not have mounted');
             fallback.style.display = 'block';
           }
         }, 1000);
       }, 3000);
      
      // Hide when React mounts (called from main.tsx)
      window.hideLoadingScreen = hideLoadingScreen;
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
